<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavithakal Studio</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="./public/logo copy.png" type="image/png">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

    <style>
        #root:empty::before {
            content: "Loading...";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ff2d6c;
        }
    </style>

    <!-- High-Speed Pre-warm Script (Executes before React) -->
    <script>
        (function () {
            try {
                const gallery = JSON.parse(localStorage.getItem('ks_cache_gallery'));
                if (gallery && Array.isArray(gallery)) {
                    // Pre-warm the first 6 images immediately to achieve <0.5s appearance
                    gallery.slice(0, 8).forEach(url => {
                        const link = document.createElement('link');
                        link.rel = 'preload';
                        link.as = 'image';
                        link.href = url;
                        document.head.appendChild(link);
                    });
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="root"></div>

    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Animation & Scroll Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Application Components -->
    <script src="config.js"></script>
    <script src="animations.js"></script>
    <script src="gallery.js"></script>
    <script src="simple_pages.js"></script>
    <script src="lightbox.js"></script>
    <script src="home.js"></script>
    <script src="portfolio.js"></script>
    <script src="montages.js"></script>
    <script src="admin.js"></script>
    <script src="app.js"></script>
</body>

</html>
